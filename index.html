<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market — השוק של המזון</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --bg-2: #10151d;
    --surface: #161c26;
    --surface-2: #1d2532;
    --border: #242d3d;
    --text: #e7ecf3;
    --text-dim: #8a94a6;
    --text-mute: #5a6477;
    --brand: #00d4a1;
    --brand-2: #00b087;
    --up: #00d4a1;
    --down: #ff4d6d;
    --accent: #6a8bff;
    --warn: #ffb547;
    --purple: #b06aff;
    --orange: #ff8c42;
    --chip: #1b2230;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #05070a; color: var(--text); font-family: 'Heebo', -apple-system, sans-serif; font-weight: 400; -webkit-font-smoothing: antialiased; }
  body {
    background:
      radial-gradient(1200px 700px at 10% -20%, rgba(0,212,161,.08), transparent 60%),
      radial-gradient(900px 600px at 90% 10%, rgba(106,139,255,.06), transparent 60%),
      #05070a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 24px;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Header area */
  .app-header {
    text-align: center;
    margin-bottom: 8px;
  }
  .app-header .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .app-header .brand .logo {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--brand), var(--brand-2));
    display: inline-flex; align-items: center; justify-content: center;
    color: #03241c; font-weight: 900;
    box-shadow: 0 8px 24px rgba(0,212,161,.3);
  }
  .app-header .brand .accent { color: var(--brand); }
  .app-header .sub {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 6px;
  }

  /* Phone frame */
  .phone {
    width: 390px;
    height: 800px;
    background: #000;
    border-radius: 56px;
    padding: 12px;
    box-shadow:
      0 0 0 3px #1a1f2a,
      0 60px 80px -30px rgba(0,0,0,.7),
      inset 0 0 0 1px rgba(255,255,255,.04);
    position: relative;
  }
  .phone::after {
    content: "";
    position: absolute;
    top: 18px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 30px; border-radius: 18px;
    background: #000;
    z-index: 100;
  }
  .screen {
    width: 100%; height: 100%;
    background: var(--bg);
    border-radius: 46px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    color: var(--text);
    font-size: 13px;
  }

  /* Status bar */
  .statusbar {
    height: 52px;
    padding: 14px 36px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    z-index: 50;
  }
  .statusbar .icons { display: inline-flex; gap: 6px; align-items: center; }
  .statusbar .icons svg { width: 14px; height: 14px; }

  /* App bar */
  .appbar {
    padding: 10px 18px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .appbar .title { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
  .appbar .title .accent { color: var(--brand); }
  .appbar .actions { display: inline-flex; gap: 8px; }
  .iconbtn {
    width: 36px; height: 36px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s ease;
  }
  .iconbtn:hover { background: var(--surface-2); color: var(--text); }
  .iconbtn:active { transform: scale(.95); }
  .iconbtn svg { width: 16px; height: 16px; }
  .iconbtn.add-btn {
    background: rgba(0,212,161,.12);
    border-color: rgba(0,212,161,.4);
    color: var(--brand);
  }
  .iconbtn.add-btn:hover { background: rgba(0,212,161,.2); color: var(--brand); }
  .iconbtn.add-btn svg { width: 18px; height: 18px; }

  /* View container */
  .views {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .view {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 4px 16px 90px;
    opacity: 0;
    pointer-events: none;
    transform: translateX(0);
    transition: opacity .22s ease, transform .26s cubic-bezier(.4,0,.2,1);
  }
  .view.active {
    opacity: 1;
    pointer-events: auto;
  }
  .view.enter-rtl { transform: translateX(-12px); }
  .view.enter-ltr { transform: translateX(12px); }
  .view.active.enter-rtl, .view.active.enter-ltr { transform: translateX(0); }

  /* Hide scrollbars */
  .view::-webkit-scrollbar { width: 0; height: 0; }

  /* Tab bar */
  .tabbar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(180deg, rgba(10,14,20,.5) 0%, rgba(10,14,20,.98) 40%);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 0 22px;
    backdrop-filter: blur(12px);
    z-index: 30;
  }
  .tab {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--text-mute);
    font-size: 10.5px; font-weight: 600;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 10px;
    position: relative;
    transition: color .15s ease;
  }
  .tab.active { color: var(--brand); }
  .tab svg { width: 22px; height: 22px; }
  .tab .badge {
    position: absolute;
    top: 2px; right: 6px;
    background: var(--down);
    color: white;
    font-size: 9px;
    font-weight: 800;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Components */
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .pill.up { background: rgba(0,212,161,.15); color: var(--up); }
  .pill.down { background: rgba(255,77,109,.15); color: var(--down); }
  .pill.ghost { background: var(--chip); color: var(--text-dim); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px 14px;
  }

  .thumb {
    width: 38px; height: 38px;
    border-radius: 11px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    background: var(--surface);
  }
  .thumb.small { width: 32px; height: 32px; font-size: 16px; border-radius: 9px; }
  .thumb.cyan { background: rgba(106,139,255,.15); }
  .thumb.green { background: rgba(0,212,161,.15); }
  .thumb.red { background: rgba(255,77,109,.15); }
  .thumb.yellow { background: rgba(255,181,71,.15); }
  .thumb.purple { background: rgba(176,106,255,.15); }
  .thumb.orange { background: rgba(255,140,66,.15); }
  /* Real product image (CDN) overlays the emoji fallback. On error it adds .failed and we hide it. */
  .thumb .thumb-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: white;
    border-radius: inherit;
    z-index: 1;
  }
  .thumb .thumb-img.failed { display: none; }
  .thumb .emoji-fallback {
    position: relative;
    z-index: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .hstack { display: flex; align-items: center; gap: 12px; }
  .vstack { display: flex; flex-direction: column; }
  .name { font-weight: 600; font-size: 14px; color: var(--text); line-height: 1.2; }
  .sub { font-size: 11.5px; color: var(--text-mute); margin-top: 2px; }
  .price { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px; }

  .section-title {
    display: flex; justify-content: space-between; align-items: center;
    margin: 16px 4px 10px;
  }
  .section-title h3 { margin: 0; font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
  .section-title a { font-size: 11.5px; color: var(--brand); text-decoration: none; font-weight: 600; cursor: pointer; }
  /* Editable list title */
  .list-title-edit {
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 10px;
    transition: all .15s ease;
  }
  .list-title-edit:hover {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 9px;
  }
  .list-title-edit .title-name { color: var(--text); }
  .list-title-edit .edit-ico {
    width: 13px; height: 13px;
    color: var(--text-mute);
    opacity: .6;
    transition: opacity .15s ease;
  }
  .list-title-edit:hover .edit-ico { opacity: 1; color: var(--brand); }

  .list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 4px;
    border-bottom: 1px solid rgba(255,255,255,.04);
    cursor: pointer;
    transition: background .12s ease;
  }
  .list-item:hover { background: rgba(255,255,255,.02); }
  .list-item:last-child { border-bottom: none; }

  /* Inline add-to-cart / watchlist buttons on product rows */
  .row-actions {
    display: inline-flex;
    gap: 6px;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .row-act {
    width: 30px; height: 30px;
    border-radius: 9px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .15s ease;
    font-size: 16px; font-weight: 700;
    line-height: 1;
    user-select: none;
  }
  .row-act:hover { background: rgba(0,212,161,.1); color: var(--brand); border-color: rgba(0,212,161,.3); }
  .row-act:active { transform: scale(.9); }
  .row-act.primary { background: rgba(0,212,161,.12); color: var(--brand); border-color: rgba(0,212,161,.4); }
  .row-act.primary.filled { background: var(--brand); color: #03241c; border-color: var(--brand); }
  .row-act.heart.active { background: rgba(255,77,109,.15); color: #ff4d6d; border-color: rgba(255,77,109,.3); }
  .row-act svg { width: 14px; height: 14px; }

  /* Unified add-toggle button (search results) — + ↔ ✓ */
  .row-act.add-toggle {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .18s ease;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .row-act.add-toggle .plus-sym { font-size: 22px; font-weight: 300; line-height: 1; color: var(--brand); }
  .row-act.add-toggle:hover {
    background: rgba(0,212,161,.12);
    border-color: rgba(0,212,161,.4);
  }
  .row-act.add-toggle.on {
    background: var(--brand);
    border-color: var(--brand);
    color: #03241c;
  }
  .row-act.add-toggle.on svg { width: 16px; height: 16px; color: #03241c; }
  .row-act.add-toggle:active { transform: scale(.92); }
  /* Small dot indicating product is also in OTHER lists (not just active one) */
  .row-act.add-toggle { position: relative; }
  .other-dot {
    position: absolute;
    top: -2px;
    right: -2px;
    width: 9px;
    height: 9px;
    background: var(--accent);
    border: 2px solid var(--bg);
    border-radius: 50%;
  }
  .row-act.add-toggle.on .other-dot { border-color: #03241c; }
  .other-lists {
    color: var(--accent);
    font-weight: 600;
  }
  .row-act .qpill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
  }

  /* Drag-and-drop feedback */
  .draggable { cursor: grab; }
  .draggable:active { cursor: grabbing; }
  .dragging { opacity: .4; transform: scale(.98); }
  .drop-target { outline: 2px dashed var(--brand); outline-offset: 2px; background: rgba(0,212,161,.08) !important; }

  /* In-list reorder insertion lines */
  .wl-row { position: relative; }
  .wl-row.drop-before::before,
  .wl-row.drop-after::after {
    content: "";
    position: absolute;
    left: -4px; right: -4px;
    height: 3px;
    background: var(--brand);
    border-radius: 2px;
    box-shadow: 0 0 12px rgba(0,212,161,.7);
    pointer-events: none;
    z-index: 5;
  }
  .wl-row.drop-before::before { top: -2px; }
  .wl-row.drop-after::after { bottom: -2px; }

  /* Watchlist — list-picker modal */
  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 150;
    display: flex; align-items: flex-end;
    animation: fadeIn .18s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-sheet {
    width: 100%;
    background: var(--surface);
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    padding: 18px 18px 30px;
    border-top: 1px solid var(--border);
    max-height: 80%;
    overflow-y: auto;
    animation: slideUp .25s cubic-bezier(.18,.89,.32,1.28);
  }
  .modal-sheet h3 { margin: 0 0 6px; font-size: 16px; font-weight: 700; }
  .modal-sheet .muted { color: var(--text-dim); font-size: 12px; margin-bottom: 14px; }
  .modal-sheet .close {
    position: absolute; top: 12px; left: 18px;
    color: var(--text-dim); font-size: 24px; cursor: pointer;
    z-index: 10;
  }
  .pick-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 6px;
    border-bottom: 1px solid rgba(255,255,255,.04);
    cursor: pointer;
    transition: background .12s ease;
    border-radius: 10px;
  }
  .pick-row:hover { background: var(--surface-2); }
  .pick-row .pick-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--surface-2);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .pick-row .pick-name { flex: 1; font-size: 13.5px; font-weight: 600; }
  .pick-row .pick-count { font-size: 11px; color: var(--text-mute); }
  .pick-row .pick-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: inline-flex; align-items: center; justify-content: center;
    color: transparent;
    flex-shrink: 0;
    transition: all .15s ease;
    font-size: 13px;
  }
  .pick-row.on .pick-check {
    background: var(--brand); border-color: var(--brand); color: #03241c;
  }
  .pick-row.on .pick-name { color: var(--brand); }
  .pick-newbtn {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 6px;
    margin-top: 8px;
    border: 1px dashed var(--border);
    border-radius: 12px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 600;
    justify-content: center;
  }
  .pick-newbtn:hover { color: var(--brand); border-color: rgba(0,212,161,.5); }

  /* Watchlist — folder chips */
  .folder-strip {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 8px 0 10px;
    scrollbar-width: none;
  }
  .folder-strip::-webkit-scrollbar { display: none; }
  .folder-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px 8px 12px;
    border-radius: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-dim);
    transition: all .15s ease;
    flex-shrink: 0;
    position: relative;
  }
  .folder-chip:hover { background: var(--surface-2); }
  .folder-chip.active {
    background: rgba(0,212,161,.1);
    border-color: rgba(0,212,161,.4);
    color: var(--brand);
  }
  .folder-chip .ico { font-size: 14px; }
  .folder-chip .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    background: var(--bg-2);
    padding: 2px 6px;
    border-radius: 8px;
    color: var(--text-mute);
  }
  .folder-chip.active .count { background: rgba(0,212,161,.18); color: var(--brand); }
  .folder-chip.drop-target {
    transform: scale(1.06);
    box-shadow: 0 4px 14px rgba(0,212,161,.25);
  }
  .folder-chip.new-btn {
    color: var(--brand);
    background: transparent;
    border-style: dashed;
  }
  .folder-chip .menu {
    width: 18px; height: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    opacity: .5;
    margin-right: 2px;
  }
  .folder-chip .menu:hover { opacity: 1; }

  /* Watchlist product row - now draggable */
  .wl-row.draggable { cursor: grab; }
  .wl-row.draggable:active { cursor: grabbing; }
  .wl-row .drag-handle {
    color: var(--text-mute);
    font-size: 14px;
    padding: 0 4px;
    opacity: .6;
  }
  .wl-empty-zone {
    padding: 30px 20px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    text-align: center;
    color: var(--text-mute);
    font-size: 12.5px;
    margin-top: 12px;
  }
  .wl-empty-zone.drop-target { border-color: var(--brand); color: var(--brand); background: rgba(0,212,161,.05); }

  /* Watched-in pill row (product detail) */
  .watched-in-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center;
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .watched-label { font-size: 11.5px; color: var(--text-mute); font-weight: 600; margin-left: 4px; }
  .watched-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(0,212,161,.1);
    color: var(--brand);
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .watched-tag:hover { background: rgba(0,212,161,.18); }

  /* Context menu for folder chips */
  .ctx-menu {
    position: absolute;
    top: 100%; left: 0;
    margin-top: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
    z-index: 120;
    min-width: 130px;
  }
  .ctx-menu .ctx-item {
    padding: 8px 10px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    border-radius: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .ctx-menu .ctx-item:hover { background: var(--surface-2); }
  .ctx-menu .ctx-item.danger { color: var(--down); }

  /* Home — Index card */
  .index-card {
    background: linear-gradient(135deg, #0f2e24 0%, #0a0e14 100%);
    border: 1px solid #1a3c31;
    border-radius: 18px;
    padding: 18px;
    position: relative;
    overflow: hidden;
    margin-top: 4px;
    transition: all .15s ease;
  }
  .index-card.clickable { cursor: pointer; }
  .index-card.clickable:hover {
    border-color: rgba(0,212,161,.5);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0,212,161,.12);
  }
  .index-card.clickable:active { transform: translateY(0); }
  .index-cta {
    margin-top: 10px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--brand);
    opacity: .8;
    transition: opacity .15s ease;
  }
  .index-card.clickable:hover .index-cta { opacity: 1; }
  .index-card .index-label { font-size: 12px; color: var(--text-dim); font-weight: 500; }
  .index-card .index-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px; font-weight: 700;
    margin-top: 2px;
    letter-spacing: -0.02em;
  }
  .index-card .index-sub { display: flex; gap: 10px; margin-top: 6px; align-items: center; }
  .index-chart {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: .9;
  }

  /* Chips */
  .chips {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 6px 0;

// ---- Watchlist helpers -----------------------------------
function isWatched(productId) {
  return state.lists.order.some(id => state.lists.byId[id].productIds.includes(productId));
}
function isInList(productId, listId) {
  const l = state.lists.byId[listId];
  return !!l && l.productIds.includes(productId);
}
function listsContaining(productId) {
  return state.lists.order.filter(id => state.lists.byId[id].productIds.includes(productId));
}
function addToList(productId, listId) {
  const l = state.lists.byId[listId];
  if (!l) return;
  if (!l.productIds.includes(productId)) l.productIds.unshift(productId);
}
function removeFromList(productId, listId) {
  const l = state.lists.byId[listId];
  if (!l) return;
  l.productIds = l.productIds.filter(p => p !== productId);
}
function moveToList(productId, targetListId) {
  // Remove from all other lists, add to target. "Move" semantics for drag-drop.
  for (const id of state.lists.order) {
    if (id !== targetListId) removeFromList(productId, id);
  }
  addToList(productId, targetListId);
}
function createList(name) {
  const base = 'list_' + Date.now().toString(36);
  const icons = ['📦','⭐','🎯','🌟','🔥','💎','🛍️','🍎','🥗','🎁','🎨','⚡'];
  const icon = icons[state.lists.order.length % icons.length];
  state.lists.byId[base] = { id: base, name: name || 'רשימה חדשה', icon, productIds: [] };
  state.lists.order.push(base);
  state.lists.active = base;
  return base;
}
function deleteList(listId) {
  if (state.lists.order.length <= 1) { showToast('חייבת להישאר לפחות רשימה אחת'); return; }
  delete state.lists.byId[listId];
  state.lists.order = state.lists.order.filter(x => x !== listId);
  if (state.lists.active === listId) state.lists.active = state.lists.order[0];
}
function renameList(listId, name) {
  if (state.lists.byId[listId]) state.lists.byId[listId].name = name || state.lists.byId[listId].name;
}

function goto(screen, opts = {}) {
  const prev = state.tab;
  state.tab = screen;
  // Tabs visible in the bottom bar — search and cart are not bottom tabs anymore.
  const TAB_SCREENS = ['home','watchlist','profile'];
  if (TAB_SCREENS.includes(screen)) {
    state.lastTab = screen;
  }
  state.history.push(screen);

  // Hide all views
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + screen);
  if (el) {
    setTimeout(() => el.classList.add('active'), 10);
  }

  // Update tab bar — search keeps the previous tab highlighted (entered via + button).
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tabName = TAB_SCREENS.includes(screen) ? screen : state.lastTab;
  const tabEl = document.querySelector(`.tab[data-tab="${tabName}"]`);
  if (tabEl) tabEl.classList.add('active');

  // Update app bar
  renderAppBar();
  // Render content
  renderCurrent();
}

function openProduct(id) {
  state.productId = id;

function back() {
  state.history.pop();
  const prev = state.history[state.history.length - 1] || 'home';

}

function toggleWatch(id) {
  // Toggle membership in the *active* list specifically.
  // A product can live in multiple lists simultaneously — clicking + on a product that's
  // already tracked in another list should still add it to the active list.
  const activeId = state.lists.active;
  const activeList = state.lists.byId[activeId];
  if (!activeList) return;
  if (isInList(id, activeId)) {
    removeFromList(id, activeId);
    showToast('הוסר מהרשימה', activeList.name);
  } else {
    addToList(id, activeId);
    showToast('המוצר נוסף בהצלחה לרשימה', activeList.name);
  }
  updateBadges();
  renderCurrent();
}

// ==========================================================
// PRODUCT IMAGES — OpenFoodFacts CDN with emoji fallback
// ==========================================================
function ofUrl(barcode, size = 200) {
  const bc = String(barcode || '').replace(/\D/g, '');
  if (bc.length < 8) return null;
  // OpenFoodFacts splits the EAN into 3-3-3-rest path segments.
  // Hebrew images come back as front_he.{size}.jpg; if not available,
  // OFF returns 404 and we fall back to the emoji.
  const a = bc.slice(0,3), b = bc.slice(3,6), c = bc.slice(6,9), d = bc.slice(9);
  return `https://images.openfoodfacts.org/images/products/${a}/${b}/${c}/${d}/front.${size}.jpg`;
}

// Render a product thumbnail: tries CDN image, falls back to emoji on error.
// Used by all product-list views (home/all/search/watchlist/product detail).
function thumbHTML(p, size = 'small') {
  const sizeCls = size === 'small' ? 'small' : '';
  const url = ofUrl(p.barcode, size === 'small' ? 200 : 400);
  if (!url) return `<span class="thumb ${sizeCls} ${p.thumbCls||''}"><span class="emoji-fallback">${p.emoji||'📦'}</span></span>`;
  return `<span class="thumb ${sizeCls} ${p.thumbCls||''}">
    <img class="thumb-img" src="${url}" alt="" loading="lazy" onerror="this.classList.add('failed')" />
    <span class="emoji-fallback">${p.emoji||'📦'}</span>
  </span>`;
}

// ==========================================================
// SVG UTILITIES
// ==========================================================
function buildLinePath(series, w, h, min, max) {
  if (series.length === 0) return '';
  const dx = w / (series.length - 1);
  return series.map((v, i) => {
    const x = i * dx;
    const y = h - ((v - min) / (max - min)) * h;
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
}

function buildSparkline(series, color) {
  const w = 60, h = 26;
  const min = Math.min(...series);
  const max = Math.max(...series);
  const range = max - min || 1;
  const path = series.slice(-12).map((v, i, arr) => {
    const x = (i / (arr.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
  return `<svg class="wl-spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${path}" stroke="${color}" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>`;
}

  // Top 5 biggest price drops (negative chg, sorted ascending).

  // Fallback if not enough drops — take the lowest movers.
  const dealsList = drops.length >= 3 ? drops : [...PRODUCTS].sort((a,b) => a.chg - b.chg).slice(0, 5);

  // Real basket index: sum of cheapest price per multi-chain product, across history
  const basketProducts = PRODUCTS.filter(p => Object.keys(p.prices).length >= 2).slice(0, 30);
  const histLen = basketProducts[0]?.history[Object.keys(basketProducts[0].history)[0]]?.length || 60;
  const idxSeries = [];
  for (let i = 0; i < histLen; i++) {
    let sum = 0;
    for (const p of basketProducts) {
      const priceAtI = Math.min(...Object.values(p.history).map(h => h[i]));
      sum += priceAtI;
    }
    idxSeries.push(sum);

function sortProductsBy(arr, sort) {
  const minP = p => Math.min(...Object.values(p.prices));
  const out = [...arr];
  switch (sort) {
    case 'movers':     out.sort((a,b) => Math.abs(b.chg) - Math.abs(a.chg)); break;
    case 'rises':      out.sort((a,b) => b.chg - a.chg); break;
    case 'drops':      out.sort((a,b) => a.chg - b.chg); break;
    case 'price-asc':  out.sort((a,b) => minP(a) - minP(b)); break;
    case 'price-desc': out.sort((a,b) => minP(b) - minP(a)); break;
    case 'name':       out.sort((a,b) => a.name.localeCompare(b.name, 'he')); break;
    default:           out.sort((a,b) => Math.abs(b.chg) - Math.abs(a.chg));
  }
  return out;
}

  const sort = state.allSort || 'movers';
  const sorted = sortProductsBy(PRODUCTS, sort);

    ['movers', '↕️ הכי השתנו'],

              <div class="row-act add-toggle ${inActive?'on':''}" onclick="toggleWatchInline('${p.id}', event)" title="${inActive?'הוסר מהרשימה הפעילה':'הוסף לרשימה הפעילה'}">
                ${inActive ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4 10-10"/></svg>' : '<span class="plus-sym">+</span>'}

// ==========================================================
// VIEW: PRODUCT DETAIL
// ==========================================================
function renderProduct() {
  const p = findProduct(state.productId);
  if (!p) return '<div class="empty"><div class="emoji">🤷</div><div class="msg">מוצר לא נמצא</div></div>';

  const rangeLen = { '1w': 7, '1m': 30, '3m': 60, '6m': 60, '1y': 60, 'all': 60 }[state.chartRange] || 60;

  const seriesAll = Object.entries(p.history).map(([chainId, data]) => ({
    chainId,
    data: data.slice(-rangeLen),
    chain: CHAINS[chainId]
  }));

  const visibleSeries = seriesAll.filter(s => !state.chartHidden[s.chainId]);
  const allVals = visibleSeries.flatMap(s => s.data);
  const min = allVals.length ? Math.min(...allVals) * 0.95 : 0;
  const max = allVals.length ? Math.max(...allVals) * 1.05 : 1;

  const W = 340, H = 140;

  const grid = [0.25, 0.5, 0.75].map(f =>
    `<line x1="0" y1="${H*f}" x2="${W}" y2="${H*f}" stroke="#1d2532" stroke-dasharray="2,4"/>`
  ).join('');

  const paths = seriesAll.map(s => {
    const hidden = state.chartHidden[s.chainId];
    if (hidden) return '';
    const path = buildLinePath(s.data, W, H, min, max);
    // Best = cheapest chain for this product right now
    const cheapestChainId = Object.entries(p.prices).sort((a,b)=>a[1]-b[1])[0][0];
    const isBest = s.chainId === cheapestChainId;
    return `<path d="${path}" stroke="${s.chain.color}" stroke-width="${isBest ? 2.2 : 1.5}" fill="none" opacity="${isBest ? 1 : 0.75}" stroke-linecap="round"/>`;
  }).join('');

  // sorted chains by price
  const chainList = Object.entries(p.prices)
    .map(([cid, pr]) => ({ ...CHAINS[cid], price: pr }))
    .sort((a,b) => a.price - b.price);

  const distances = { rami: 0.8, shufersal: 1.2, victory: 2.1, yochananof: 3.4, mega: 4.7 };

  const _sortedPrices = Object.values(p.prices).sort((a,b)=>a-b);
  const medianPrice = _sortedPrices.length ? _sortedPrices[Math.floor(_sortedPrices.length / 2)] : 0;
  const isWatchedNow = isWatched(p.id);
  const watchedLists = listsContaining(p.id);

  const legend = seriesAll.map(s => {
    const hidden = state.chartHidden[s.chainId];
    return `<span class="leg ${hidden?'hidden':''}" onclick="toggleChain('${s.chainId}')"><span class="dot" style="background: ${s.chain.color}"></span>${s.chain.name}</span>`;
  }).join('');

  const ranges = [
    ['1w','1ש'],['1m','1ח'],['3m','3ח'],['6m','6ח'],['1y','1ש'],['all','הכל']
  ].map(([k,l]) => `<span class="r ${state.chartRange===k?'active':''}" onclick="setRange('${k}')">${l}</span>`).join('');

  // Last point for pulsing dot
  let dotX = W, dotY = H/2, dotColor = '#00d4a1';
  const cheapestId = Object.entries(p.prices).sort((a,b)=>a[1]-b[1])[0][0];
  const bestSeries = seriesAll.find(s => s.chainId === cheapestId && !state.chartHidden[s.chainId]);
  if (bestSeries && bestSeries.data.length) {
    const last = bestSeries.data[bestSeries.data.length-1];
    dotY = H - ((last - min) / (max - min)) * H;
  }

  return `
    <div class="prod-hero">
      <div class="hstack" style="margin-bottom: 12px;">
        <span class="thumb prod-thumb ${p.thumbCls}" style="width: 48px; height: 48px; font-size: 26px;">
          ${ofUrl(p.barcode, 400) ? `<img class="thumb-img" src="${ofUrl(p.barcode, 400)}" alt="" loading="lazy" onerror="this.classList.add('failed')" />` : ''}
          <span class="emoji-fallback">${p.emoji}</span>
        </span>
        <div class="vstack" style="flex: 1;">
          <span class="name" style="font-size: 16px;">${p.name}</span>
          <span class="sub" style="font-size: 12px;">${p.size}</span>
        </div>
        <div class="heart-btn iconbtn ${isWatchedNow?'active':''}" onclick="openListPicker('${p.id}', event)" title="הוסף לרשימה">
          <svg viewBox="0 0 24 24" fill="${isWatchedNow?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        </div>
      </div>
      <div class="hstack" style="gap: 10px;">
        <span class="big-price">₪${medianPrice.toFixed(2)}</span>
        <span class="pill ${p.chg >= 0 ? 'up' : 'down'}">${p.chg >= 0 ? '▲' : '▼'} ${Math.abs(p.chg)}%</span>
      </div>
      <div style="font-size: 11.5px; color: var(--text-mute); margin-top: 4px;">מחיר חציוני · עודכן לפני 4 דקות</div>
    </div>

    <div class="chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none">
        <defs>
          <linearGradient id="pgBest" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#00d4a1" stop-opacity=".25"/>
            <stop offset="100%" stop-color="#00d4a1" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${grid}
        ${paths}
        <circle cx="${(W).toFixed(1)}" cy="${dotY.toFixed(1)}" r="4" fill="${dotColor}"/>
        <circle cx="${(W).toFixed(1)}" cy="${dotY.toFixed(1)}" r="8" fill="${dotColor}" opacity=".25"><animate attributeName="r" from="4" to="12" dur="1.6s" repeatCount="indefinite"/><animate attributeName="opacity" from=".5" to="0" dur="1.6s" repeatCount="indefinite"/></circle>
      </svg>
      <div class="chart-legend">${legend}</div>
      <div class="range-tabs">${ranges}</div>
    </div>

    <div class="section-title"><h3>מחיר נוכחי לפי רשת</h3></div>
    <div class="card">
      ${chainList.map((c,i) => `
        <div class="chain-row">
          <div class="hstack">
            <span class="chain-logo" style="background: ${c.bg}; color: ${c.color};">${c.short}</span>
            <div class="vstack">
              <span class="name" style="display: flex; align-items: center;">${i===0?'<span class="cheap-badge">הכי זול</span>':''}${c.name}</span>
              <span class="sub">${distances[c.id]} ק"מ ${i===0?'· פתוח':''}</span>
            </div>
          </div>
          <span class="price" style="${i===0?'color: var(--brand)':''}">₪${c.price.toFixed(2)}</span>
        </div>
      `).join('')}
    </div>

    ${watchedLists.length ? `
      <div class="watched-in-row">
        <span class="watched-label">ברשימות:</span>
        ${watchedLists.map(lid => {
          const l = state.lists.byId[lid];
          return `<span class="watched-tag" onclick="goto('watchlist'); state.lists.active='${lid}'; renderCurrent();">${l.icon} ${l.name}</span>`;
        }).join('')}
      </div>
    ` : ''}

    <div class="action-row">
      <div class="btn ${isWatchedNow?'active':'primary'}" onclick="openListPicker('${p.id}')">${isWatchedNow?`✓ ברשימה (${watchedLists.length})`:'+ הוסף למעקב'}</div>
    </div>
  `;
}

function setRange(r) {
  state.chartRange = r;
  renderCurrent();
}

function toggleChain(id) {
  state.chartHidden[id] = !state.chartHidden[id];
  renderCurrent();
}

// ==========================================================
// VIEW: WATCHLIST
// ==========================================================
function renderWatchlist() {
  const activeList = state.lists.byId[state.lists.active] || state.lists.byId[state.lists.order[0]];
  if (!activeList) return '<div class="empty"><div class="emoji">💚</div><div class="msg">אין רשימות</div></div>';

  const items = activeList.productIds.map(id => findProduct(id)).filter(Boolean);
  const total = items.reduce((sum, p) => sum + Math.min(...Object.values(p.prices)), 0);
  const alerts = items.filter(p => Math.abs(p.chg) > 3).length;

  // ---- Chain comparison ("smart cart" insights) for the active list ----
  let chainTotals = null, bestChainEntry = null, worstChainEntry = null, savings = 0, savingsPct = 0;
  if (items.length > 0) {
    const totals = {};
    const missing = {};
    const totalQty = items.length;
    for (const cid of Object.keys(CHAINS)) { totals[cid] = 0; missing[cid] = 0; }
    for (const p of items) {
      const prices = Object.values(p.prices).sort((a,b) => a-b);
      const median = prices.length ? prices[Math.floor(prices.length/2)] : 0;
      for (const cid of Object.keys(CHAINS)) {
        if (p.prices[cid] != null) totals[cid] += p.prices[cid];
        else { totals[cid] += median; missing[cid] += 1; }
      }
    }
    // Only consider chains that carry at least one of the items
    const sorted = Object.entries(totals)
      .filter(([cid]) => missing[cid] < totalQty)
      .sort((a,b) => a[1] - b[1]);
    if (sorted.length) {
      bestChainEntry = sorted[0];
      worstChainEntry = sorted[sorted.length - 1];
      savings = worstChainEntry[1] - bestChainEntry[1];
      savingsPct = worstChainEntry[1] > 0 ? (savings / worstChainEntry[1]) * 100 : 0;
      chainTotals = sorted;
    }
  }

  // Folder strip — each chip is a drop-target
  const folderStrip = `
    <div class="folder-strip" id="folder-strip">
      ${state.lists.order.map(lid => {
        const l = state.lists.byId[lid];
        const active = lid === state.lists.active;
        return `
          <div class="folder-chip ${active?'active':''}"
               data-list-id="${lid}"
               onclick="selectList('${lid}')"
               ondragover="onFolderDragOver(event, '${lid}')"
               ondragleave="onFolderDragLeave(event)"
               ondrop="onFolderDrop(event, '${lid}')">
            <span class="ico">${l.icon}</span>
            <span>${l.name}</span>
            <span class="count">${l.productIds.length}</span>
            ${active ? `<span class="menu" onclick="openFolderMenu(event, '${lid}')">⋯</span>` : ''}
          </div>
        `;
      }).join('')}
      <div class="folder-chip new-btn" onclick="promptNewList()">
        + תיקייה חדשה
      </div>
    </div>
  `;

  if (items.length === 0) {
    return `
      ${folderStrip}
      <div class="wl-empty-zone"
           ondragover="onFolderDragOver(event, '${activeList.id}')"
           ondragleave="onFolderDragLeave(event)"
           ondrop="onFolderDrop(event, '${activeList.id}')">
        <div style="font-size: 36px; margin-bottom: 10px;">${activeList.icon}</div>
        <div style="font-weight: 700; color: var(--text); font-size: 14px; margin-bottom: 4px;">${activeList.name} — ריקה</div>
        <div>גררו לכאן מוצרים מהבית, או</div>
        <div class="btn primary" style="margin-top: 14px; display: inline-block; padding: 8px 16px;" onclick="goto('search')">חפשו מוצר</div>
      </div>
    `;
  }

  // Chain comparison hero & bars (replaces the old cart screen)
  const insights = (chainTotals && bestChainEntry && worstChainEntry) ? `
    <div class="cart-hero" style="margin-top: 4px;">
      <div class="savings-label">הזולה ביותר · ${items.length} מוצרים ב${activeList.name}</div>
      <div style="display: flex; align-items: baseline; gap: 8px; margin-top: 4px;">
        <span class="chain-logo" style="background: ${CHAINS[bestChainEntry[0]].bg}; color: ${CHAINS[bestChainEntry[0]].color}; width: 28px; height: 28px; font-size: 11px;">${CHAINS[bestChainEntry[0]].short}</span>
        <span class="savings-val">₪${bestChainEntry[1].toFixed(2)}</span>
      </div>
      <div class="savings-meta">חוסך <b style="color: var(--brand)">₪${savings.toFixed(2)}</b> מול הרשת היקרה · ${savingsPct.toFixed(1)}% חיסכון</div>
    </div>

    <div class="bar-compare" style="margin-top: 14px; margin-bottom: 4px;">
      ${chainTotals.map(([cid, sum], i) => {
        const pct = (sum / worstChainEntry[1]) * 100;
        const fillCls = i === 0 ? 'best' : (i === chainTotals.length - 1 ? 'high' : 'mid');
        const c = CHAINS[cid];
        const amtColor = i === 0 ? 'color: var(--brand)' : (i === chainTotals.length - 1 ? 'color: var(--down)' : '');
        return `
          <div class="bar-row">
            <span class="chain">${c.name}</span>
            <div class="bar-track"><div class="bar-fill ${fillCls}" style="width: ${pct}%"></div></div>
            <span class="amount" style="${amtColor}">₪${sum.toFixed(0)}</span>
          </div>
        `;
      }).join('')}
    </div>
  ` : '';

  return `
    ${folderStrip}

    ${insights}

    ${alerts > 0 ? `
      <div class="card alert-card" style="margin-top: 8px; padding: 12px;">
        <div class="hstack" style="align-items: flex-start;">
          <span class="thumb small yellow">🔔</span>
          <div class="vstack" style="gap: 2px;">
            <span class="name">${alerts} התראות מחיר חדשות</span>
            <span class="sub">שינויים מעל 3% היום ב${activeList.name}</span>
          </div>
        </div>
      </div>
    ` : ''}

    <div class="section-title">
      <h3 class="list-title-edit" onclick="renameFolderPrompt('${activeList.id}')" title="לחץ כדי לערוך את שם הרשימה">
        ${activeList.icon} <span class="title-name">${activeList.name}</span>
        <svg class="edit-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <span style="color: var(--text-mute); font-weight: 500; font-size: 12px;">· ${items.length} מוצרים</span>
      </h3>
      <a onclick="goto('search')">הוסף +</a>
    </div>

    <div class="card"
         ondragover="onFolderDragOver(event, '${activeList.id}')"
         ondragleave="onFolderDragLeave(event)"
         ondrop="onFolderDrop(event, '${activeList.id}')">
      ${items.map(p => {
        const price = Math.min(...Object.values(p.prices));
        const color = p.chg > 0 ? '#ff4d6d' : (p.chg < 0 ? '#00d4a1' : '#5a6477');
        return `
          <div class="wl-row draggable"
               draggable="true"
               ondragstart="onProductDragStart(event, '${p.id}', '${activeList.id}')"
               ondragend="onProductDragEnd(event)"
               ondragover="onRowDragOver(event, '${p.id}', '${activeList.id}')"
               ondragleave="onRowDragLeave(event)"
               ondrop="onRowDrop(event, '${p.id}', '${activeList.id}')"
               onclick="openProduct('${p.id}')">
            ${thumbHTML(p, 'small')}
            <div class="vstack">
              <span class="name" style="font-size: 13px;">${p.name}</span>
              <span class="sub">${p.size}</span>
            </div>
            ${buildSparkline(p.history[Object.keys(p.history)[0]] || [], color)}
            <div class="vstack" style="align-items: flex-start;">
              <span class="price" style="font-size: 12.5px;">₪${price.toFixed(2)}</span>
              <span class="pill ${p.chg >= 0 ? 'up' : 'down'}" style="padding: 2px 6px; font-size: 10px; margin-top: 2px;">${p.chg >= 0 ? '▲' : '▼'}${Math.abs(p.chg)}%</span>
            </div>
            <button class="wl-remove" onclick="removeFromActiveList(event, '${p.id}')" title="הסר מהרשימה" aria-label="הסר">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
            <span class="drag-handle" title="גרור לסידור פנימי">⋮⋮</span>
          </div>
        `;
      }).join('')}
    </div>

    <div style="text-align: center; font-size: 10.5px; color: var(--text-mute); margin-top: 14px; line-height: 1.6;">
      💡 גררו מוצר למעלה/למטה לסידור פנימי, או על שם תיקייה אחרת להעברה
    </div>
  `;
}

// ---- Folder/list UI actions -------------------------------
function selectList(listId) {
  state.lists.active = listId;
  renderCurrent();
}
function promptNewList() {
  const name = (prompt('שם התיקייה החדשה:', 'רשימה חדשה') || '').trim();
  if (!name) return;
  createList(name);
  showToast(`"${name}" נוצרה`);
  renderCurrent();
}
function openFolderMenu(ev, listId) {
  ev.stopPropagation();
  ev.preventDefault();
  closeFolderMenu();
  const chip = ev.currentTarget.closest('.folder-chip');
  if (!chip) return;
  const menu = document.createElement('div');
  menu.className = 'ctx-menu';
  menu.id = 'folder-ctx';
  menu.innerHTML = `
    <div class="ctx-item" onclick="renameFolderPrompt('${listId}')">✏️ שנה שם</div>
    <div class="ctx-item" onclick="changeFolderIcon('${listId}')">🎨 החלף אייקון</div>
    <div class="ctx-item danger" onclick="deleteFolderConfirm('${listId}')">🗑️ מחק תיקייה</div>
  `;
  chip.appendChild(menu);
  setTimeout(() => {
    document.addEventListener('click', closeFolderMenuOnce, { once: true });
  }, 0);
}
function closeFolderMenu() {
  const m = document.getElementById('folder-ctx');
  if (m) m.remove();
}
function closeFolderMenuOnce(ev) {
  if (ev.target.closest('#folder-ctx')) return;
  closeFolderMenu();
}
function renameFolderPrompt(listId) {
  closeFolderMenu();
  const cur = state.lists.byId[listId].name;
  const next = (prompt('שם חדש:', cur) || '').trim();
  if (next && next !== cur) {
    renameList(listId, next);
    renderCurrent();
  }
}
function changeFolderIcon(listId) {
  closeFolderMenu();
  const choices = ['💚','🕯️','🧴','⭐','🔥','💎','🛍️','🍎','🥗','🎁','🎨','⚡','🎯','🌶️','🍷','🥛','🍫','🧀','🥦','🍼','🌿','❄️','💧'];
  const cur = state.lists.byId[listId].icon;
  const i = choices.indexOf(cur);
  const next = choices[(i + 1) % choices.length];
  state.lists.byId[listId].icon = next;
  renderCurrent();
}
function deleteFolderConfirm(listId) {
  closeFolderMenu();
  const l = state.lists.byId[listId];
  if (!l) return;
  const ok = confirm(`למחוק את "${l.name}"?\n${l.productIds.length} מוצרים יוסרו מהרשימה.`);
  if (ok) {
    deleteList(listId);
    showToast(`"${l.name}" נמחקה`);
    renderCurrent();
  }
}

// ---- Drag-and-drop ----------------------------------------
function onProductDragStart(ev, productId, sourceListId) {
  state.dragProductId = productId;
  state.dragSourceListId = sourceListId || null;   // null when dragged from home/search (no source list)
  ev.dataTransfer.effectAllowed = 'move';
  try { ev.dataTransfer.setData('text/plain', productId); } catch (e) {}
  ev.currentTarget.classList.add('dragging');
}
function onProductDragEnd(ev) {
  ev.currentTarget.classList.remove('dragging');
  state.dragProductId = null;
  state.dragSourceListId = null;
  state.dragOverListId = null;
  // Clean up any lingering drop-target classes & insertion-line markers
  document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
  document.querySelectorAll('.drop-before, .drop-after').forEach(el => {
    el.classList.remove('drop-before');
    el.classList.remove('drop-after');
  });
}
function onFolderDragOver(ev, listId) {
  if (!state.dragProductId) return;
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  if (state.dragOverListId !== listId) {
    document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
    state.dragOverListId = listId;
  }
  ev.currentTarget.classList.add('drop-target');
}
function onFolderDragLeave(ev) {
  // Only clear if we're actually leaving (not moving to a child)
  if (ev.currentTarget.contains(ev.relatedTarget)) return;
  ev.currentTarget.classList.remove('drop-target');
}
function onFolderDrop(ev, listId) {
  ev.preventDefault();
  ev.stopPropagation();
  const productId = state.dragProductId || ev.dataTransfer.getData('text/plain');
  if (productId) {
    const wasInThisList = isInList(productId, listId);
    moveToList(productId, listId);
    const l = state.lists.byId[listId];
    const p = findProduct(productId);
    if (!wasInThisList) {
      showToast(`הועבר ל${l.name}`, p ? p.name : null);
    }
    updateBadges();
  }
  state.dragProductId = null;
  state.dragSourceListId = null;
  state.dragOverListId = null;
  document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
  renderCurrent();
}

// ---- In-list drag-to-reorder ------------------------------
function onRowDragOver(ev, targetProductId, listId) {
  if (!state.dragProductId) return;
  // Only enable insertion line for same-list reorders.
  if (state.dragSourceListId !== listId) return;
  if (state.dragProductId === targetProductId) return;
  ev.preventDefault();
  ev.stopPropagation();
  ev.dataTransfer.dropEffect = 'move';
  // Decide above-or-below based on Y position relative to row midpoint.
  const rect = ev.currentTarget.getBoundingClientRect();
  const isAbove = (ev.clientY - rect.top) < rect.height / 2;
  // Clear other markers in this card
  const card = ev.currentTarget.closest('.card');
  if (card) {
    card.querySelectorAll('.drop-before, .drop-after').forEach(el => {
      if (el !== ev.currentTarget) {
        el.classList.remove('drop-before');
        el.classList.remove('drop-after');
      }
    });
  }
  ev.currentTarget.classList.toggle('drop-before', isAbove);
  ev.currentTarget.classList.toggle('drop-after', !isAbove);
}
function onRowDragLeave(ev) {
  if (ev.currentTarget.contains(ev.relatedTarget)) return;
  ev.currentTarget.classList.remove('drop-before');
  ev.currentTarget.classList.remove('drop-after');
}
function onRowDrop(ev, targetProductId, listId) {
  if (!state.dragProductId) return;
  // Only handle same-list reorder. Cross-list moves fall through to the card/folder drop.
  if (state.dragSourceListId !== listId) return;
  if (state.dragProductId === targetProductId) return;
  ev.preventDefault();
  ev.stopPropagation();

  const list = state.lists.byId[listId];
  if (!list) return;
  const rect = ev.currentTarget.getBoundingClientRect();
  const isAbove = (ev.clientY - rect.top) < rect.height / 2;

  // Reorder productIds
  const arr = list.productIds.slice();
  const fromIdx = arr.indexOf(state.dragProductId);
  if (fromIdx === -1) return;
  arr.splice(fromIdx, 1);
  let toIdx = arr.indexOf(targetProductId);
  if (toIdx === -1) {
    arr.push(state.dragProductId);
  } else {
    if (!isAbove) toIdx += 1;
    arr.splice(toIdx, 0, state.dragProductId);
  }
  list.productIds = arr;

  // Cleanup
  state.dragProductId = null;
  state.dragSourceListId = null;
  state.dragOverListId = null;
  document.querySelectorAll('.drop-before, .drop-after').forEach(el => {
    el.classList.remove('drop-before');
    el.classList.remove('drop-after');
  });
  renderCurrent();
}

function renderCart() {
  const items = Object.entries(state.cart).map(([id, qty]) => ({ product: findProduct(id), qty })).filter(x => x.product);
  if (items.length === 0) {
    return `
      <div class="empty">
        <div class="emoji">🛒</div>
        <div class="msg" style="font-size: 15px; color: var(--text);">העגלה ריקה</div>
        <div style="margin-top: 6px;">הוסיפו מוצרים וראו איפה הסל הכי זול</div>
        <div class="btn primary" style="margin-top: 20px; display: inline-block; padding: 10px 20px;" onclick="goto('search')">התחילו לקנות</div>
      </div>
    `;
  }

  // Total per chain. If a product is missing in a chain, use median price as fallback.
  const totals = {};
  const missing = {};
  for (const cid of Object.keys(CHAINS)) { totals[cid] = 0; missing[cid] = 0; }
  for (const { product, qty } of items) {
    const prices = Object.values(product.prices);
    const median = prices.sort((a,b)=>a-b)[Math.floor(prices.length/2)];
    for (const cid of Object.keys(CHAINS)) {
      if (product.prices[cid] != null) {
        totals[cid] += product.prices[cid] * qty;
      } else {
        totals[cid] += median * qty;  // fallback
        missing[cid] += qty;
      }
    }
  }

  // Only rank chains that actually carry most items
  const sorted = Object.entries(totals)
    .filter(([cid]) => missing[cid] < items.reduce((s, i) => s + i.qty, 0))  // has at least one real price
    .sort((a,b)=>a[1]-b[1]);
  const best = sorted[0];
  const worst = sorted[sorted.length-1];
  const savings = worst[1] - best[1];
  const savingsPct = ((savings / worst[1]) * 100).toFixed(1);
  const bestChain = CHAINS[best[0]];
  const maxTotal = worst[1];

  return `
    <div class="cart-hero">
      <div class="savings-label">הזולה ביותר · ${items.reduce((s,i)=>s+i.qty,0)} פריטים</div>
      <div style="display: flex; align-items: baseline; gap: 8px; margin-top: 4px;">
        <span class="chain-logo" style="background: ${bestChain.bg}; color: ${bestChain.color}; width: 28px; height: 28px; font-size: 11px;">${bestChain.short}</span>
        <span class="savings-val">₪${best[1].toFixed(2)}</span>
      </div>
      <div class="savings-meta">חוסך <b style="color: var(--brand)">₪${savings.toFixed(2)}</b> מול הרשת היקרה · ${savingsPct}% חיסכון</div>
    </div>

    <div class="section-title"><h3>השוואת רשתות</h3></div>

    <div class="bar-compare">
      ${sorted.map(([cid, total], i) => {
        const pct = (total / maxTotal) * 100;
        const fillCls = i === 0 ? 'best' : (i === sorted.length-1 ? 'high' : 'mid');
        const c = CHAINS[cid];
        const amtColor = i === 0 ? 'color: var(--brand)' : (i === sorted.length-1 ? 'color: var(--down)' : '');
        return `
          <div class="bar-row">
            <span class="chain">${c.name}</span>
            <div class="bar-track"><div class="bar-fill ${fillCls}" style="width: ${pct}%"></div></div>
            <span class="amount" style="${amtColor}">₪${total.toFixed(0)}</span>
          </div>
        `;
      }).join('')}
    </div>

    <div class="section-title"><h3>בסל</h3><a onclick="goto('search')">הוסף +</a></div>

    <div class="card">
      ${items.map(({ product: p, qty }) => `
        <div class="cart-item">
          ${thumbHTML(p, 'small')}
          <div class="vstack" onclick="openProduct('${p.id}')" style="cursor:pointer;">
            <span class="name" style="font-size: 12.5px;">${p.name}</span>
            <span class="sub">₪${p.prices[best[0]].toFixed(2)} ב${bestChain.name}</span>
          </div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="updateQty('${p.id}', -1)">−</button>
            <span class="qty-num">${qty}</span>
            <button class="qty-btn" onclick="updateQty('${p.id}', 1)">+</button>
          </div>
          <button class="qty-btn" onclick="removeFromCart('${p.id}')" style="background: transparent; color: var(--text-mute); font-size: 16px;">×</button>
        </div>
      `).join('')}
    </div>

    <div class="action-row">
      <div class="btn primary" onclick="showToast('נווט ל${bestChain.name}')">נווט ל${bestChain.name} ←</div>
    </div>
  `;
}

  'שתייה': '🥤', 'משקאות': '🥤',

  'שמן': '🫒', 'לחם': '🍞',
  'ניקיון': '🧴', 'תינוקות': '🍼',
  'אחר': '📦',
};
function getSearchCategories() {
  const cats = {};
  for (const p of PRODUCTS) {
    cats[p.cat] = (cats[p.cat] || 0) + 1;
  }
  // Return list sorted by count desc, with "all" at front
  const list = Object.entries(cats)
    .filter(([k]) => k && k !== 'אחר')   // hide generic "other"
    .sort((a, b) => b[1] - a[1])
    .map(([name, count]) => ({ name, count, icon: CAT_ICON[name] || '📦' }));
  // Append "אחר" at the end if present
  if (cats['אחר']) list.push({ name: 'אחר', count: cats['אחר'], icon: '📦' });
  return list;
}

// Highlight matching characters in a string (case-insensitive over Hebrew + Latin)
function highlightMatch(text, query) {
  if (!query) return escapeHTML(text);
  const q = query.trim();
  if (!q) return escapeHTML(text);
  // Find all character occurrences (case-insensitive). Each query character that
  // appears in the text gets wrapped in <em>. We do contiguous-substring match first;
  // if found, highlight that span. Otherwise fall back to per-character highlights.
  const lowerText = text.toLowerCase();
  const lowerQ = q.toLowerCase();
  const idx = lowerText.indexOf(lowerQ);
  if (idx >= 0) {
    return escapeHTML(text.slice(0, idx)) +
      '<em class="hl">' + escapeHTML(text.slice(idx, idx + q.length)) + '</em>' +
      escapeHTML(text.slice(idx + q.length));
  }
  // Per-character: highlight the first occurrence of each query char
  const chars = [...q.toLowerCase()];
  const used = new Array(text.length).fill(false);
  for (const ch of chars) {
    const i = lowerText.indexOf(ch);
    if (i >= 0) used[i] = true;
  }
  let out = '';
  for (let i = 0; i < text.length; i++) {
    out += used[i] ? `<em class="hl">${escapeHTML(text[i])}</em>` : escapeHTML(text[i]);
  }
  return out;
}
function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ==========================================================
// RENDER DISPATCH
// ==========================================================
function renderCurrent() {
  const renderers = {
    home: renderHome,
    all: renderAllProducts,
    search: renderSearch,
    watchlist: renderWatchlist,
    cart: renderCart,
    product: renderProduct,
    profile: renderProfile,
  };
  const id = 'view-' + state.tab;
  const el = document.getElementById(id);
  if (el && renderers[state.tab]) el.innerHTML = renderers[state.tab]();
}

// ==========================================================
// INIT
// ==========================================================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}
updateClock();
setInterval(updateClock, 30000);

updateBadges();
goto('home');
</script>

</body>
</html>
